<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6D28D9">
<title>第44回新春春日井マラソン 結果報告 | 愛知工業大学 陸上競技部</title>
<meta name="description" content="第44回新春春日井マラソンに出場しました。">
<link rel="icon" type="image/png" href="/images/head/logo-rounded.png">
<link rel="apple-touch-icon" href="/images/head/logo.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/style.css">
<style>
  /* =========================================================
     【この記事専用スタイル】縦長メイン画像2枚を中央揃えグリッドで表示
     ・グローバルの css/js には手を加えていません（記事内に限定）
     ・縦長写真が大きくなりすぎないよう最大幅を抑えて中央寄せ
     【調整】max-width＝2枚合計の最大横幅 / gap＝画像の間隔
     ========================================================= */
  .main-portrait-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;                 /* 【調整】画像の間隔 */
    max-width:560px;          /* 【調整】縦長が大きくなりすぎない上限。中央寄せ */
    margin:0 auto 8px;        /* 中央揃え */
  }
  .main-portrait-grid figure{ margin:0; }
  .main-portrait-grid img{
    width:100%;
    height:auto;
    display:block;
    border-radius:10px;
  }
  .main-portrait-grid figcaption{
    text-align:center;
    font-size:13px;
    color:#6B7280;            /* デザイン仕様のサブグレー */
    margin-top:6px;
  }
  @media (max-width:520px){
    .main-portrait-grid{ gap:10px; max-width:100%; }  /* スマホでも2枚並びを維持 */
  }
</style>
</head>
<body>

<!-- ヘッダー：js/layout.js が自動挿入します（編集は js/layout.js の1か所だけ） -->
<div id="site-header"></div>

<!-- ===== PAGE HERO ===== -->
<div class="page-hero">
  <h1 class="page-hero-en">NEWS</h1>
  <p class="page-hero-ja">ニュース</p>
</div>

<!-- ===== ARTICLE ===== -->
<section class="section">
  <div class="container">
    <div class="article-wrap">

      <!-- 記事ヘッダー -->
      <div class="article-head">
        <div class="article-meta">
          <time class="article-date">2026.01.11</time>
          <span class="cat-tag cat-tag--result">大会結果</span>
        </div>

        <h1 class="article-title">第44回新春春日井マラソン 結果報告</h1>
      </div>

      <!-- ===== メイン画像（縦長2枚・中央揃えグリッド）===== -->
      <div class="main-portrait-grid">
        <figure>
          <img src="/images/news/2026-01-11-1.jpg" alt="表彰">
          <figcaption>表彰</figcaption>
        </figure>
        <figure>
          <img src="/images/news/2026-01-11-2.jpg" alt="結果">
          <figcaption>結果</figcaption>
        </figure>
      </div>

      <!-- ===== 記事本文 ===== -->
      <div class="article-body">

        <p>
          1月11日、春日井市総合体育館第1競技場にて開催された「第44回新春春日井マラソン」に、本部から部員が出場しました。
        </p>

        <p>
          良い天候の中、多くの声援を浴びながら気持ちよく走ることができました。応援していただいた皆様、ありがとうございました。
        </p>

        <h2>主な結果</h2>

        <p>
          長距離の主な入賞は以下の通りです。
        </p>

        <ul>
          <li>10000m 岩田 玄弥（3年）30'03"（1位）</li>
          <li>10000m 加藤 晨（3年）31'30"（6位）</li>
        </ul>

      </div>
      <!-- /article-body -->

      <!-- 記事フッター（ナビゲーション） -->
      <div class="article-footer">
        <a href="/news/" class="article-back-btn">← ニュース一覧に戻る</a>
      </div>

    </div>
    <!-- /article-wrap -->
  </div>
</section>

<!-- フッター：js/layout.js が自動挿入します（編集は js/layout.js の1か所だけ） -->
<div id="site-footer"></div>

<script src="/js/layout.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
