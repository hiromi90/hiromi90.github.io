<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6D28D9">
<title>自己ベスト記録 | 愛知工業大学 陸上競技部</title>
<meta name="description" content="愛知工業大学 陸上競技部 現部員の自己ベスト記録一覧。長距離・短距離ブロック別に掲載。">
<link rel="icon" type="image/png" href="/images/head/logo-rounded.png">
<!-- ホーム画面に追加（Webアプリ化）したときのアイコン。画像は images/head/ を参照 -->
<link rel="apple-touch-icon" href="/images/head/logo.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ヘッダー：js/layout.js が自動挿入します（編集は js/layout.js の1か所だけ） -->
<div id="site-header"></div>

<!-- ===== PAGE HERO ===== -->
<div class="page-hero">
  <h1 class="page-hero-en">PERSONAL BESTS</h1>
  <p class="page-hero-ja">自己ベスト記録</p>
</div>

<!-- ===== PERSONAL RECORDS ===== -->
<section class="section">
  <div class="container">

    <!-- タブナビゲーション -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="tab-long">長距離</button>
      <button class="tab-btn" data-tab="tab-short">短距離</button>
    </div>

    <!-- 長距離タブ -->
    <div class="tab-content active" id="tab-long">
      <p id="personal-long-update"></p>
      <p style="font-size:13px;color:var(--sub);margin-bottom:16px;">
        ← 列が多い場合は横にスクロールできます →
      </p>
      <div id="personal-long-table"></div>
      <div id="hidden-long-box">
        <h3>非表示中の選手</h3>
        <div id="hidden-long-list"></div>
      </div>
    </div>

    <!-- 短距離タブ -->
    <div class="tab-content" id="tab-short">
      <p id="personal-short-update"></p>
      <p style="font-size:13px;color:var(--sub);margin-bottom:16px;">
        ← 列が多い場合は横にスクロールできます →
      </p>
      <div id="personal-short-table"></div>
      <div id="hidden-short-box">
        <h3>非表示中の選手</h3>
        <div id="hidden-short-list"></div>
      </div>
    </div>

  </div>
</section>

<!-- フッター：js/layout.js が自動挿入します（編集は js/layout.js の1か所だけ） -->
<div id="site-footer"></div>

<script src="/js/layout.js"></script>
<script src="/js/content-loader.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
